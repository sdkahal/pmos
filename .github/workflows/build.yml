name: Build postmarketOS

on:
  workflow_dispatch:

jobs:
  build-pmos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 git qemu-user-static expect kpartx openssl

      - name: Setup pmbootstrap (Wiki Way)
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

      - name: Initialize with Expect (Robust CI Version)
        run: |
          export TERM=dumb
          export NO_COLOR=1

          expect <<'EOF'
          set timeout 900

          spawn stdbuf -oL pmbootstrap init

          expect {
              -re ".*Work path.*" {
                  send "\r"
                  exp_continue
              }
              -re ".pmaports.*path.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Channel.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Vendor.*" {
                  send "qcom\r"
                  exp_continue
              }
              -re ".*Device codename.*" {
                  send "msm89x7\r"
                  exp_continue
              }
              -re ".*Username.*" {
                  send "user\r"
                  exp_continue
              }
              -re ".*Provider.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*USB moded.*" {
                  send "developer\r"
                  exp_continue
              }
              -re ".*User interface.*" {
                  send "console\r"
                  exp_continue
              }
              -re ".*Install systemd.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Change them.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Extra packages.*" {
                  send "nano,htop,neofetch\r"
                  exp_continue
              }
              -re ".*this timezone.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Locale.*" {
                  send "zh_CN\r"
                  exp_continue
              }
              -re ".*hostname.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Build outdated.*" {
                  send "y\r"
                  exp_continue
              }
              -re ".*Zap existing.*" {
                  send "\r"
                  exp_continue
              }
              eof
          }
          EOF

      - name: Build and Export
        run: |
          pmbootstrap install --password 12345

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmos-msm89x7-image
          path: |
            ~/.local/var/pmbootstrap/chroot_native/home/pmos/rootfs/*.img
            ~/.local/var/pmbootstrap/chroot_rootfs_qcom-msm89x7/boot/*.img
