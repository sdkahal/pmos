name: Build postmarketOS

on:
  workflow_dispatch:

jobs:
  build-pmos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 git qemu-user-static kpartx openssl \
            sudo wget curl rsync procps \
            build-essential \
            fakeroot \
            bison flex \
            device-tree-compiler \
            ccache \
            e2fsprogs \
            dosfstools \
            parted

      - name: Enable binfmt and loop devices
        run: |
          sudo modprobe loop || true
          sudo losetup -f || true
          sudo update-binfmts --enable || true

      - name: Setup pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

      - name: Initialize pmbootstrap
        run: |
          export TERM=dumb
          export NO_COLOR=1
          printf '\n\n\nqcom\nmsm89x7\nuser\n\ndeveloper\nconsole\n\n\nnano,htop,neofetch\n\nzh_CN\n\ny\n\n' | pmbootstrap init --shallow-initial-clone
          pmbootstrap status

      - name: Apply Kernel Patch and Config
        run: |
          PKG_NAME="linux-postmarketos-qcom-msm89x7"
          WORK=$(pmbootstrap config work)
          KERNEL_PKG_PATH=$(find "$WORK/cache_git/pmaports" -type d -name "$PKG_NAME" | head -n1)
          if [ -z "$KERNEL_PKG_PATH" ]; then
            echo "Kernel package path not found"
            exit 1
          fi
          CONF_TARGET="config-postmarketos-qcom-msm89x7.aarch64"
          cd "$KERNEL_PKG_PATH"
          if [ -f "$GITHUB_WORKSPACE/patches/wifi-fix.patch" ]; then
            cp "$GITHUB_WORKSPACE/patches/wifi-fix.patch" ./
            grep -q "wifi-fix.patch" APKBUILD || sed -i 's|source="|source="wifi-fix.patch |' APKBUILD
            echo "Successfully applied wifi-fix.patch"
          else
            echo "Error: wifi-fix.patch not found"
            exit 1
          fi
          echo "Updating kernel config: $CONF_TARGET"
          if [ -f "$GITHUB_WORKSPACE/patches/config_new.txt" ]; then
            cp "$GITHUB_WORKSPACE/patches/config_new.txt" "./$CONF_TARGET"
            echo "Successfully applied config_new.txt"
          else
            echo "Error: config_new.txt not found"
            exit 1
          fi
          pmbootstrap checksum $PKG_NAME

      - name: Build kernel
        run: |
          unset CI
          export USE_CCACHE=1
          pmbootstrap -v -j2 build linux-postmarketos-qcom-msm89x7 --force

      - name: Install and Export Image
        run: |
          pmbootstrap install --password 12345
          pmbootstrap export --no-install -- /tmp/pmos-export

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmos-msm89x7-image
          path: |
            /tmp/pmos-export/*.img

      - name: Cleanup
        if: always()
        run: |
          pmbootstrap shutdown || true
