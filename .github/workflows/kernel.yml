name: Complie Kernel

on:
  workflow_dispatch:

jobs:
  build-pmos:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 git qemu-user-static expect kpartx openssl \
            sudo wget curl rsync \
            build-essential \
            fakeroot \
            bison flex \
            device-tree-compiler \
            ccache \
            e2fsprogs \
            dosfstools \
            parted

      - name: Enable binfmt and loop devices
        run: |
          sudo modprobe loop || true
          sudo losetup -f || true
          sudo update-binfmts --enable || true

      - name: Setup pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

      - name: Initialize with Expect
        run: |
          export TERM=dumb
          export NO_COLOR=1

          expect <<'EOF'
          set timeout 900

          spawn stdbuf -oL pmbootstrap init

          expect {
              -re ".*Work path.*" {
                  send "\r"
                  exp_continue
              }
              -re ".pmaports.*path.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Channel.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Vendor.*" {
                  send "qcom\r"
                  exp_continue
              }
              -re ".*Device codename.*" {
                  send "msm89x7\r"
                  exp_continue
              }
              -re ".*Username.*" {
                  send "user\r"
                  exp_continue
              }
              -re ".*Provider.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*USB moded.*" {
                  send "developer\r"
                  exp_continue
              }
              -re ".*User interface.*" {
                  send "console\r"
                  exp_continue
              }
              -re ".*Install systemd.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Change them.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Extra packages.*" {
                  send "nano,htop,neofetch\r"
                  exp_continue
              }
              -re ".*this timezone.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Locale.*" {
                  send "zh_CN\r"
                  exp_continue
              }
              -re ".*hostname.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Build outdated.*" {
                  send "y\r"
                  exp_continue
              }
              -re ".*Zap existing.*" {
                  send "\r"
                  exp_continue
              }
              eof
          }
          EOF

      - name: Prepare Kernel Source
        run: |
          git clone --depth=1 https://github.com/msm89x7-mainline/linux.git kernel_src
          
          cd kernel_src
          if [ -f "$GITHUB_WORKSPACE/patches/wifi-fix.patch" ]; then
            git apply "$GITHUB_WORKSPACE/patches/wifi-fix.patch"
            echo "Successfully applied wifi-fix.patch"
          fi

          if [ -f "$GITHUB_WORKSPACE/patches/config_new.txt" ]; then
            cp "$GITHUB_WORKSPACE/patches/config_new.txt" arch/arm64/configs/pmos_defconfig
            echo "Successfully applied config_new.txt as pmos_defconfig"
          else
            echo "Error: config_new.txt not found"
            exit 1
          fi

      - name: Compile Kernel
        run: |
          cd kernel_src
          bash -c "source ../pmbootstrap/helpers/envkernel.sh && make pmos_defconfig && make -j$(nproc)"

      - name: Package to APK
        run: |
          cd kernel_src
          pmbootstrap build --envkernel linux-postmarketos-qcom-msm89x7

      - name: Collect APK Only
        run: |
          WORK_PATH=$(pmbootstrap config work)
          mkdir -p output/
          find "$WORK_PATH/packages" -name "linux-postmarketos-qcom-msm89x7*.apk" -exec cp {} output/ \;

      - name: Upload Kernel APK
        uses: actions/upload-artifact@v4
        with:
          name: pmos-kernel-packages
          path: output/
