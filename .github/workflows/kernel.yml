name: Use pmbootstrap Compile Kernel

on:
  workflow_dispatch:

jobs:
  compile-kernel:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3 git qemu-user-static expect kpartx openssl \
            sudo wget curl rsync \
            build-essential \
            fakeroot \
            bison flex \
            device-tree-compiler \
            ccache \
            e2fsprogs \
            dosfstools \
            parted

      - name: Setup pmbootstrap
        run: |
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "PMB_HELPERS=$PWD/pmbootstrap/helpers" >> $GITHUB_ENV
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

      - name: Initialize with Expect
        run: |
          export TERM=dumb
          export NO_COLOR=1

          expect <<'EOF'
          set timeout 900

          spawn stdbuf -oL pmbootstrap init

          expect {
              -re ".*Work path.*" {
                  send "\r"
                  exp_continue
              }
              -re ".pmaports.*path.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Channel.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Vendor.*" {
                  send "qcom\r"
                  exp_continue
              }
              -re ".*Device codename.*" {
                  send "msm89x7\r"
                  exp_continue
              }
              -re ".*Username.*" {
                  send "user\r"
                  exp_continue
              }
              -re ".*Provider.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*USB moded.*" {
                  send "developer\r"
                  exp_continue
              }
              -re ".*User interface.*" {
                  send "console\r"
                  exp_continue
              }
              -re ".*Install systemd.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Change them.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Extra packages.*" {
                  send "nano,htop,neofetch\r"
                  exp_continue
              }
              -re ".*this timezone.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Locale.*" {
                  send "zh_CN\r"
                  exp_continue
              }
              -re ".*hostname.*" {
                  send "\r"
                  exp_continue
              }
              -re ".*Build outdated.*" {
                  send "y\r"
                  exp_continue
              }
              -re ".*Zap existing.*" {
                  send "\r"
                  exp_continue
              }
              eof
          }
          EOF

      - name: Download Kernel Source
        run: |
          git clone --depth 1 -b msm89x7/6.19.5 https://github.com/msm89x7-mainline/linux.git kernel_src

      - name: Prepare Build Environment
        run: |
          cd kernel_src
          
          if [ -f "$GITHUB_WORKSPACE/patches/wifi-fix.patch" ]; then
            echo "Applying wifi-fix.patch..."
            patch -p1 < "$GITHUB_WORKSPACE/patches/wifi-fix.patch"
          else
            echo "Error: wifi-fix.patch not found"
            exit 1
          fi

          mkdir -p arch/arm64/configs/
          if [ -f "$GITHUB_WORKSPACE/patches/config_new.txt" ]; then
            cp "$GITHUB_WORKSPACE/patches/config_new.txt" arch/arm64/configs/msm89x7_defconfig
            echo "Successfully applied config_new.txt as msm89x7_defconfig"
          else
            echo "Error: config_new.txt not found"
            exit 1
          fi
          
          cp ${{ env.PMB_HELPERS }}/envkernel.sh ./
          chmod +x envkernel.sh

      - name: Compile Kernel
        run: |
          cd kernel_src

          touch .scmversion

          expect <<'EOF'
          set timeout -1
          spawn bash --login

          send "source ./envkernel.sh --gcc\r"

          expect {
              "Source directory is not clean" { exp_continue }
              "Initializing Alpine chroot" { exp_continue }
              "activated successfully" {}
              timeout { exit 1 }
          }

          send "make msm89x7_defconfig\r"

          expect {
              "configuration written to" {}
              timeout { exit 1 }
          }

          # 关键：带输出 + 控制并行
          send "make -j2 V=1\r"

          # 关键：直接等结束，不匹配字符串
          expect eof
          EOF

      - name: Package APK
        run: |
          cd kernel_src
          pmbootstrap -v build --envkernel linux-postmarketos-qcom-msm89x7

      - name: Collect APKs
        run: |
          mkdir -p $GITHUB_WORKSPACE/output
          WORK_PATH="$HOME/.local/var/pmbootstrap"
          find "$WORK_PATH/packages" -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output/ \;

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: msm89x7-kernel-standard-apk
          path: ${{ github.workspace }}/output/*.apk
