name: Build postmarketOS Image

on:
  workflow_dispatch:

jobs:
  build-pmos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # 安装图片中提到的 kpartx 以及构建必备工具
          sudo apt-get install -y python3 git qemu-user-static expect kpartx openssl

      - name: Setup pmbootstrap (Wiki Way)
        run: |
          # 1. 克隆仓库
          git clone --depth=1 https://gitlab.postmarketos.org/postmarketOS/pmbootstrap.git
          
          # 2. 创建本地 bin 目录并建立软链接
          mkdir -p ~/.local/bin
          ln -s "$PWD/pmbootstrap/pmbootstrap.py" ~/.local/bin/pmbootstrap
          
          # 3. 关键步骤：将 ~/.local/bin 加入 GitHub Action 的环境变量 PATH 中
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          
          # 4. 验证（确保在后续 step 中能直接搜到 pmbootstrap）
          export PATH="$HOME/.local/bin:$PATH"
          pmbootstrap --version

      - name: Initialize with Expect
        run: |
          mkdir -p /home/runner/pmbootstrap_work
          
          # 注意：pmbootstrap init 第一次运行可能会询问源码位置
          # 这里的 expect 脚本逻辑涵盖了你图片中的所有配置
          expect <<EOF
          set timeout 600
          spawn pmbootstrap init

          # 如果提示源码位置（通常是因为初次运行且未安装在标准路径）
          expect {
            "Location of pmbootstrap git checkout*" { 
                send "$GITHUB_WORKSPACE/pmbootstrap\r" 
                exp_continue 
            }
            "Work path*" { send "/home/runner/pmbootstrap_work\r" }
          }
          
          expect "Release channel*" { send "edge\r" }
          expect "Vendor*" { send "qcom\r" }
          expect "Device codename*" { send "msm89x7\r" }
          expect "Username*" { send "user\r" }
          expect "Audio backend*" { send "pulseaudio\r" }
          expect "WiFi backend*" { send "wpa_supplicant\r" }
          expect "USB moded*" { send "developer\r" }
          expect "User interface*" { send "console\r" }
          expect "Additional options*" { send "default\r" }
          expect "Extra packages*" { send "nano,htop,neofetch\r" }
          expect "Timezone*" { send "Asia/Shanghai\r" }
          expect "Hostname*" { send "qcom-msm89x7\r" }
          expect "Build outdated*" { send "y\r" }
          
          # 处理最后的确认或 zap 提示
          expect {
            "Zap chroots*" { send "y\r" }
            eof
          }
          EOF

      - name: Build and Export
        run: |
          # 对应图片中的执行命令
          pmbootstrap zap -hc
          pmbootstrap install --no-fde --non-interactive
          
          mkdir -p ./output
          pmbootstrap export --dest ./output
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmos-msm89x7-image
          path: ./output/*.img
