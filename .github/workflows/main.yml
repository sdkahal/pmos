name: Build postmarketOS Image

on:
  workflow_dispatch: # 手动触发构建

jobs:
  build-pmos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip git qemu-user-static expect kpartx
          pip3 install --break-system-packages pmbootstrap

      - name: Initialize pmbootstrap with Expect
        run: |
          # 创建工作目录
          mkdir -p /home/runner/pmbootstrap_work
          
          # 使用 Expect 脚本模拟图片中的 14 个交互步骤
          expect <<EOF
          set timeout 600
          spawn pmbootstrap init

          # 1. 工作路径 (Work path)
          expect "Work path*" { send "/home/runner/pmbootstrap_work\r" }
          
          # 2. 发行版通道 (Release channel)
          expect "Release channel*" { send "edge\r" }
          
          # 3. 供应商 (Vendor)
          expect "Vendor*" { send "qcom\r" }
          
          # 4. 设备代号 (Device codename)
          expect "Device codename*" { send "msm89x7\r" }
          
          # 5. 用户名 (Username)
          expect "Username*" { send "user\r" }
          
          # 6. 音频后端 (Audio backend)
          expect "Audio backend*" { send "pulseaudio\r" }
          
          # 7. WiFi 后端 (WiFi backend)
          expect "WiFi backend*" { send "wpa_supplicant\r" }
          
          # 8. USB 模式 (USB Moded)
          expect "USB moded*" { send "developer\r" }
          
          # 9. 用户界面 (User Interface)
          expect "User interface*" { send "console\r" }
          
          # 10. 安装 Systemd (Install systemd)
          expect "Additional options*" { send "default\r" }
          
          # 11. 额外软件包 (Extra packages)
          expect "Extra packages*" { send "nano,htop,neofetch\r" }
          
          # 12. 时区 (Timezone)
          expect "Timezone*" { send "Asia/Shanghai\r" }
          
          # 13. 主机名 (Hostname)
          expect "Hostname*" { send "qcom-msm89x7\r" }
          
          # 14. 确认并完成
          expect "Build outdated*" { send "y\r" }
          
          expect eof
          EOF

      - name: Build and Export Image
        run: |
          # 对应图片中的构建步骤
          pmbootstrap zap -hc
          pmbootstrap install --no-fde --non-interactive
          
          # 导出镜像
          mkdir -p ./output
          pmbootstrap export --dest ./output
          
          # 检查导出的文件
          ls -R ./output

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pmos-msm89x7-image
          path: ./output/*.img
